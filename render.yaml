services:
  - type: web
    name: koresearch
    runtime: docker
    repo: https://github.com/your-org/koresearch
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: koresearch
          envVarKey: RENDER_EXTERNAL_URL
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          type: database
          name: koresearch-db
          property: host
      - key: DB_PORT
        fromService:
          type: database
          name: koresearch-db
          property: port
      - key: DB_DATABASE
        fromService:
          type: database
          name: koresearch-db
          property: database
      - key: DB_USERNAME
        fromService:
          type: database
          name: koresearch-db
          property: user
      - key: DB_PASSWORD
        fromService:
          type: database
          name: koresearch-db
          property: password
      - key: CACHE_DRIVER
        value: redis
      - key: REDIS_HOST
        fromService:
          type: redis
          name: koresearch-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: koresearch-cache
          property: port
      - key: RUN_MIGRATIONS
        value: "true"
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync

  - type: redis
    name: koresearch-cache
    ipAllowList: []
    plan: free

  - type: database
    name: koresearch-db
    databaseName: koresearch
    plan: free
