services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      CACHE_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUN_MIGRATIONS: "true"
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  storage-data:
  redis-data:
